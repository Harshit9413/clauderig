name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build binary in Debian Bullseye (GLIBC 2.31 compatibility)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            python:3.11-slim-bullseye \
            bash -c "apt-get update -q && apt-get install -y -q binutils && \
                     pip install pyinstaller -r requirements.txt -q && \
                     pyinstaller clauderig.spec --distpath dist/linux --workpath build/linux --clean"
          sudo chown -R "$USER:$USER" dist/ build/
      - name: Package as .deb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          chmod +x build-linux.sh
          APP_VERSION="$VERSION" SKIP_BUILD=1 ./build-linux.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb

  build-macos-arm:
    name: Build macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          pip install pyinstaller
          pip install -r requirements.txt
          chmod +x build-macos.sh
          APP_VERSION="$VERSION" ./build-macos.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm-zip
          path: dist/*.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller clauderig.spec --distpath dist/windows --workpath build/windows --clean
          Compress-Archive -Path dist/windows/clauderig.exe -DestinationPath "dist/clauderig_${VERSION}_windows_amd64.zip"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [build-macos-arm]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm-zip
          path: zips/
      - id: sha
        run: echo "arm64=$(sha256sum zips/*.zip | awk '{print $1}')" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        with:
          repository: harshit9413/homebrew-clauderig
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - run: |
          VERSION=${{ github.ref_name }}
          VERSION="${VERSION#v}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" homebrew-tap/Formula/clauderig.rb
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"${{ steps.sha.outputs.arm64 }}\"/" homebrew-tap/Formula/clauderig.rb
          cd homebrew-tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/clauderig.rb
          git diff --cached --quiet && echo "Formula already up to date" || git commit -m "Update to ${{ github.ref_name }}"
          git push || echo "Nothing to push"

  publish-apt:
    name: Publish to APT Repo
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: debs/
      - uses: actions/checkout@v4
        with:
          repository: harshit9413/apt-repo
          token: ${{ secrets.APT_REPO_TOKEN }}
          ref: gh-pages
          path: apt-repo
      - run: |
          sudo apt-get install -y reprepro
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import
          DEB=$(find "$GITHUB_WORKSPACE/debs" -name "*.deb" | head -1)
          cd "$GITHUB_WORKSPACE/apt-repo"
          reprepro includedeb stable "$DEB"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Release ${{ github.ref_name }}"
          git push
